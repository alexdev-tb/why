id: lock-file-version
tool: cargo
language: cargo
title: Lock file version conflict
tags: [lockfile, version, incompatible]
patterns:
  - ["lock file version"]
  - ["Cargo.lock needs to be updated"]
  - ["lock file", "incompatible"]

explain: |
  The Cargo.lock file was generated by a different version of Cargo and is
  not compatible with your current version. This happens when collaborating
  with someone using a newer or older Rust toolchain.

fix: |
  1. Delete and regenerate: rm Cargo.lock && cargo build
  2. Or update the lock file: cargo update
  3. Make sure your team agrees on a minimum Rust version
  4. Check your Rust version: rustc --version

links:
  - https://doc.rust-lang.org/cargo/guide/cargo-toml-vs-cargo-lock.html
