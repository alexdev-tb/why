id: feature-not-found
tool: cargo
language: cargo
title: Feature not found in crate
tags: [features, dependencies, configuration]
patterns:
  - ["does not have the feature"]
  - ["feature", "not found"]

explain: |
  You enabled a feature in Cargo.toml that the crate does not provide. Features are
  optional capabilities that crates can expose. You may have misspelled the feature
  name or it was removed in a newer version.

fix: |
  1. Check available features for the crate: cargo doc --open, or look at the
     crate's Cargo.toml on crates.io
  2. Fix the feature name in your Cargo.toml
  3. If the feature was removed, update your code to not depend on it
  4. Check if you have the right version of the crate

example_error: |
  error: Package `serde v1.0.200` does not have feature `nonexistent`. It has these features:
  alloc, default, derive, rc, std, unstable

links:
  - https://doc.rust-lang.org/cargo/reference/features.html
