id: E0308
tool: rustc
language: rust
title: Mismatched types
tags: [types, type-mismatch, type-system]

explain: |
  The compiler expected one type but found a different one. This is one of the most common Rust
  errors and happens when you return the wrong type from a function, assign a value of the wrong
  type to a variable, or pass an argument that does not match the parameter type. Rust has no
  implicit type conversions, so even closely related types like `i32` and `u32` are considered
  mismatched.

fix: |
  Check the expected type shown in the error message and either change your value to match that
  type, or update the type annotation to match the value. Use explicit conversions like `.into()`,
  `as`, or `From`/`Into` traits when you need to convert between compatible types.

example_error: |
  error[E0308]: mismatched types
   --> src/main.rs:3:24
    |
  3 |     let x: u32 = -1_i32;
    |            ---   ^^^^^^ expected `u32`, found `i32`
    |            |
    |            expected due to this

example_code: |
  fn main() {
      let x: u32 = -1_i32; // Error: expected u32, found i32
  }

links:
