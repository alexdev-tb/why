id: double-free
tool: gcc/clang
language: c_cpp
title: Double free or memory corruption
tags: [runtime, memory, heap, free, undefined-behavior]

explain: |
  Your program attempted to free a block of memory that was already freed, or the heap metadata has been corrupted. This is a runtime error detected by the C library's memory allocator. Common causes include:
  - Calling free() twice on the same pointer
  - Freeing a pointer that was not allocated with malloc/calloc/realloc
  - Heap buffer overflow corrupting allocator metadata
  - Using a pointer after it has been freed, then freeing it again
  - Freeing a stack-allocated variable

fix: |
  1. Set pointers to NULL immediately after freeing them
  2. Check for NULL before freeing: if (ptr) { free(ptr); ptr = NULL; }
  3. Track ownership of allocated memory carefully
  4. Use valgrind or AddressSanitizer to find the exact location: gcc -fsanitize=address
  5. Avoid storing multiple copies of the same pointer if only one should free it
  6. In C++, prefer smart pointers (std::unique_ptr, std::shared_ptr) over raw pointers

example_error: |
  free(): double free detected in tcache 2
  Aborted (core dumped)

example_code: |
  #include <stdlib.h>

  int main() {
      int *ptr = malloc(sizeof(int));
      *ptr = 42;
      free(ptr);
      free(ptr);  // Error: double free!
      return 0;
  }

