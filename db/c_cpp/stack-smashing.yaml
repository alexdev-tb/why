id: stack-smashing
tool: gcc/clang
language: c_cpp
title: Stack smashing detected (buffer overflow)
tags: [runtime, memory, stack, buffer-overflow, security]

explain: |
  Your program wrote past the end of a stack-allocated buffer, overwriting the stack canary value placed by the compiler. This is a security protection mechanism that detects stack buffer overflows. Common causes include:
  - Writing more data to an array than it can hold
  - Using unsafe functions like gets(), strcpy(), or sprintf() without bounds checking
  - Off-by-one errors in loops that write to arrays
  - Incorrect buffer size calculations

fix: |
  1. Use bounds-checked functions: fgets() instead of gets(), strncpy() instead of strcpy(), snprintf() instead of sprintf()
  2. Verify buffer sizes before writing data
  3. Check loop bounds carefully for off-by-one errors
  4. Use AddressSanitizer for detailed diagnostics: gcc -fsanitize=address
  5. Enable all warnings: gcc -Wall -Wextra -Warray-bounds
  6. In C++, prefer std::string and std::vector over raw arrays

example_error: |
  *** stack smashing detected ***: terminated
  Aborted (core dumped)

example_code: |
  #include <string.h>

  int main() {
      char buf[8];
      strcpy(buf, "this string is way too long for buf");
      return 0;
  }

links:
