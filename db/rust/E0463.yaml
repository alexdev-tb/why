id: E0463
tool: rustc
language: rust
title: Can't find crate
tags: [crates, dependencies, cargo, imports]

explain: |
  The compiler cannot find the external crate you are trying to use. This typically means the
  crate is not listed as a dependency in your `Cargo.toml` file, the crate name is misspelled,
  or you have not run `cargo build` or `cargo fetch` after adding the dependency. It can also
  happen if you are using `extern crate` syntax with a crate name that does not match any
  available crate.

fix: |
  Add the crate to your `Cargo.toml` under `[dependencies]` with the correct name and version
  (e.g., `serde = "1.0"`), then run `cargo build` to download it. Double-check the crate name
  on crates.io to make sure the spelling is correct. Note that crate names with hyphens in
  `Cargo.toml` use underscores in Rust code (e.g., `my-crate` becomes `my_crate`).

example_error: |
  error[E0463]: can't find crate for `rand`
   --> src/main.rs:1:1
    |
  1 | use rand::Rng;
    | ^^^^^^^^^^^^^^ can't find crate

example_code: |
  // Cargo.toml does not have rand in [dependencies]
  use rand::Rng;

  fn main() {
      let n: u32 = rand::thread_rng().gen_range(1..=100);
      println!("{}", n);
  }

links:
