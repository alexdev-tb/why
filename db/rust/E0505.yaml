id: E0505
tool: rustc
language: rust
title: Move out of borrowed content
tags: [ownership, borrowing, borrow-checker, move-semantics]

explain: |
  You tried to move a value while it is still borrowed. When you lend out a reference to some
  data, Rust guarantees that the data will remain valid for the lifetime of that reference. Moving
  the value would invalidate the memory the reference points to, so the compiler rejects this.
  This commonly happens when you try to pass an owned value to a function while a reference to it
  is still alive.

fix: |
  Either drop or stop using the reference before moving the value, or clone the value so the
  original stays in place for the reference. You can also restructure your code to borrow the
  value instead of moving it, by passing `&value` rather than `value`.

example_error: |
  error[E0505]: cannot move out of `message` because it is borrowed
   --> src/main.rs:5:10
    |
  4 |     let r = &message;
    |             -------- borrow of `message` occurs here
  5 |     drop(message);
    |          ^^^^^^^ move out of `message` occurs here
  6 |     println!("{}", r);
    |                    - borrow later used here

example_code: |
  fn main() {
      let message = String::from("hello");
      let r = &message;       // borrow occurs here
      drop(message);           // Error: cannot move `message` while borrowed
      println!("{}", r);
  }

links:
