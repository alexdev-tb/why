id: stash-conflict
tool: git
language: git
title: Conflict when applying stash
tags: [stash, conflict, merge, apply]
patterns:
  - ["CONFLICT", "stash"]
  - ["could not apply stash"]
  - ["Applying autostash resulted in conflicts"]
  - ["overwritten by merge", "stash your changes"]

explain: |
  Git tried to reapply your stashed changes but the files have changed since you stashed
  them, creating a merge conflict. The stash is not dropped when this happens — your
  stashed changes are still saved. You need to manually resolve the conflicts, just like
  a merge conflict.

fix: |
  1. Open the conflicting files and look for <<<<<<< / ======= / >>>>>>> markers
  2. Edit each conflict to keep the code you want, removing the markers
  3. Stage the resolved files: git add <file>
  4. Once resolved, drop the stash manually: git stash drop

example_error: |
  Auto-merging src/main.rs
  CONFLICT (content): Merge conflict in src/main.rs
  The stash entry is kept in case you need it again.

links:
  - https://git-scm.com/docs/git-stash
