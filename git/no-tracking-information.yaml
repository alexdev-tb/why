id: no-tracking-information
tool: git
language: git
title: No tracking information for branch
tags: [branch, tracking, upstream, remote]
patterns:
  - ["There is no tracking information for the current branch"]
  - ["no tracking information"]
  - ["If you wish to set tracking information"]

explain: |
  Your local branch is not linked to any remote branch. When you run git pull or
  git push without arguments, git does not know which remote branch to sync with.
  This usually happens when you created a branch locally and never pushed it, or
  when you checked out a branch that was created without a remote counterpart.

fix: |
  1. Set the upstream for your current branch:
     git branch --set-upstream-to=origin/<branch-name>
  2. Or push and set upstream in one step:
     git push -u origin <branch-name>
  3. To see which branches have tracking info:
     git branch -vv

example_error: |
  There is no tracking information for the current branch.
  Please specify which branch you want to merge with.
  See git-pull(1) for details.

      git pull <remote> <branch>

  If you wish to set tracking information for this branch you can do so with:

      git branch --set-upstream-to=origin/<branch> main

links:
  - https://git-scm.com/docs/git-branch
