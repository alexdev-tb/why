name: Publish DB

on:
  push:
    branches: [main]
    paths:
      - "db/**"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - run: python scripts/validate.py

  publish-db:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish db branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save db contents before wiping the tree
          cp -r db /tmp/why-db

          git checkout --orphan db-staging
          git rm -rf .

          # Copy db contents to root (rust/, python/, etc.)
          cp -r /tmp/why-db/* .
          # Remove all TEMPLATE files (root-level and any leftover per-language)
          find . -name 'TEMPLATE.yaml' -delete

          git add -A
          count=$(find . -name '*.yaml' | wc -l)
          git commit -m "Update error database ($count entries)"
          git push origin db-staging:db --force
